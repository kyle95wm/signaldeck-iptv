services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:${WEB_PORT:-8090}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_PLAYBACK_MODE: ${VITE_PLAYBACK_MODE:-hybrid}
    ports:
      - "${WEB_PORT:-8090}:80"
    depends_on:
      - server
